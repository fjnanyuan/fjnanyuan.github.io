<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>每日时间记录</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #182033;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #eef3ff;
      --primary-text: #1f2b4d;
      --success: #e8f6ef;
      --danger: #fdecec;
      --disabled: #d7dbe2;
      --disabled-text: #7b8594;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 18px 16px 40px;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.25;
    }

    .desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin: 0;
    }

    .today-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid var(--line);
      font-size: 14px;
      line-height: 1.6;
    }

    .today-line {
      margin-top: 4px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    button {
      border: none;
      border-radius: 22px;
      font-size: 18px;
      font-weight: 700;
      padding: 22px 12px;
      color: var(--primary-text);
      background: var(--primary);
      min-height: 92px;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
      box-shadow: inset 0 0 0 1px rgba(20, 37, 63, 0.04);
    }

    button:active {
      transform: scale(0.985);
    }

    button.disabled,
    button:disabled {
      background: var(--disabled);
      color: var(--disabled-text);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .show-btn {
      background: var(--success);
      color: #153223;
    }

    .tool-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .small-btn {
      min-height: 58px;
      padding: 14px 8px;
      font-size: 15px;
      border-radius: 18px;
    }

    .danger {
      background: var(--danger);
      color: #5a1f1f;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      font-size: 14px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
      font-weight: 800;
    }

    td:first-child,
    th:first-child {
      text-align: left;
      min-width: 144px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .muted {
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(14px);
      background: rgba(24, 32, 51, 0.92);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.24s ease;
      max-width: calc(100vw - 32px);
      text-align: center;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 520px) {
      body {
        padding: 14px 12px 36px;
      }

      .card {
        border-radius: 24px;
        padding: 16px;
      }

      .grid {
        gap: 12px;
      }

      button {
        min-height: 88px;
        font-size: 17px;
      }

      .tool-row {
        grid-template-columns: 1fr 1fr;
      }

      .tool-row .wide-mobile {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>每日时间记录</h1>
      <p class="desc">点击一次就自动记录日本时间。每天每个按钮只能记录 1 次；记录后会自动变灰并不可再次点击。数据只保存在这台设备的浏览器本地。</p>
      <div class="today-box" id="todayInfo"></div>
    </div>

    <div class="card">
      <div class="grid" id="buttonGrid">
        <button data-field="wakeUp">起床</button>
        <button data-field="gymStart">健身开始</button>
        <button data-field="gymEnd">健身结束</button>
        <button data-field="sleep">睡觉</button>
        <button data-field="lieDown">躺下了</button>
        <button data-field="secondSleep">二次入睡</button>
        <button class="wide show-btn" id="showBtn">显示最近21天</button>
      </div>

      <div class="tool-row">
        <button class="small-btn" id="exportBtn">导出备份</button>
        <button class="small-btn" id="importBtn">导入备份</button>
        <button class="small-btn danger wide-mobile" id="clearBtn">清空全部数据</button>
      </div>
      <input type="file" id="importFile" accept="application/json" />

      <div class="note">
        建议先用 Safari 打开，再添加到 iPhone 主屏幕。只要一直使用同一个网址，记录就会保留在这台手机本地浏览器中。
      </div>
    </div>

    <div class="card" id="recordsCard">
      <div class="section-title">最近21天</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>起床</th>
              <th>健身开始</th>
              <th>健身结束</th>
              <th>躺下了</th>
              <th>睡觉</th>
              <th>二次入睡</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'dailyTrackerData_v2_tokyo';
    const FIELD_ORDER = ['wakeUp', 'gymStart', 'gymEnd', 'lieDown', 'sleep', 'secondSleep'];
    const FIELD_LABELS = {
      wakeUp: '起床',
      gymStart: '健身开始',
      gymEnd: '健身结束',
      sleep: '睡觉',
      lieDown: '躺下了',
      secondSleep: '二次入睡'
    };
    const WEEK_MAP = ['日', '一', '二', '三', '四', '五', '六'];

    let data = loadData();

    function getTokyoNow() {
      const now = new Date();
      const dateFormatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      });
      const timeFormatter = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Asia/Tokyo',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      const weekdayFormatter = new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        weekday: 'short'
      });

      const date = dateFormatter.format(now);
      const time = timeFormatter.format(now);
      const weekdayRaw = weekdayFormatter.format(now).replace('曜日', '').replace(/\s/g, '');
      return { date, time, weekdayRaw };
    }

    function toTokyoDateFromOffset(daysAgo) {
      const now = new Date();
      const tokyoNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
      tokyoNow.setHours(12, 0, 0, 0);
      tokyoNow.setDate(tokyoNow.getDate() - daysAgo);
      const y = tokyoNow.getFullYear();
      const m = String(tokyoNow.getMonth() + 1).padStart(2, '0');
      const d = String(tokyoNow.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDisplayDate(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(y, m - 1, d, 12, 0, 0);
      const weekday = WEEK_MAP[dt.getDay()];
      return `${y}/${String(m).padStart(2, '0')}/${String(d).padStart(2, '0')}（${weekday}）`;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        return {};
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function ensureDay(date) {
      if (!data[date]) {
        data[date] = {
          wakeUp: null,
          gymStart: null,
          gymEnd: null,
          sleep: null,
          lieDown: null,
          secondSleep: null
        };
      }
      return data[date];
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove('show');
      }, 1800);
    }

    function record(field) {
      const { date, time } = getTokyoNow();
      const day = ensureDay(date);
      if (day[field]) {
        showToast(`${FIELD_LABELS[field]} 今天已经记录过了`);
        return;
      }
      day[field] = time;
      saveData();
      refreshButtons();
      renderTable();
      renderTodayInfo();
      showToast(`${FIELD_LABELS[field]} 已记录：${time}`);
    }

    function refreshButtons() {
      const { date } = getTokyoNow();
      const today = ensureDay(date);
      document.querySelectorAll('button[data-field]').forEach(btn => {
        const field = btn.dataset.field;
        const done = !!today[field];
        btn.disabled = done;
        btn.classList.toggle('disabled', done);
        btn.textContent = done
          ? `${FIELD_LABELS[field]}\n已记录 ${today[field]}`
          : FIELD_LABELS[field];
      });
    }

    function renderTodayInfo() {
      const { date, time } = getTokyoNow();
      const today = ensureDay(date);
      const lines = FIELD_ORDER.map(field => {
        const val = today[field] || '无数据';
        return `${FIELD_LABELS[field]}：${val}`;
      }).join('｜');

      document.getElementById('todayInfo').innerHTML = `
        <div><strong>今天（日本时间）</strong>：${formatDisplayDate(date)}</div>
        <div class="today-line">当前日本时间：${time}</div>
        <div class="today-line">${lines}</div>
      `;
    }

    function renderTable() {
      const tbody = document.getElementById('recordsBody');
      tbody.innerHTML = '';

      for (let i = 0; i < 21; i++) {
        const date = toTokyoDateFromOffset(i);
        const day = data[date] || {};
        const tr = document.createElement('tr');

        const cells = [
          formatDisplayDate(date),
          day.wakeUp || '无数据',
          day.gymStart || '无数据',
          day.gymEnd || '无数据',
          day.lieDown || '无数据',
          day.sleep || '无数据',
          day.secondSleep || '无数据'
        ];

        cells.forEach((text, index) => {
          const cell = document.createElement(index === 0 ? 'td' : 'td');
          cell.textContent = text;
          if (text === '无数据') {
            cell.classList.add('muted');
          }
          tr.appendChild(cell);
        });

        tbody.appendChild(tr);
      }
    }

    function exportBackup() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const now = getTokyoNow().date.replace(/-/g, '');
      a.href = url;
      a.download = `daily-tracker-backup-${now}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('备份已导出');
    }

    function importBackup(file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
            throw new Error('格式不正确');
          }
          data = parsed;
          saveData();
          refreshButtons();
          renderTable();
          renderTodayInfo();
          showToast('备份已导入');
        } catch (err) {
          alert('导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file);
    }

    function clearAllData() {
      const ok = confirm('确定清空全部本地记录吗？此操作无法恢复。');
      if (!ok) return;
      data = {};
      saveData();
      refreshButtons();
      renderTable();
      renderTodayInfo();
      showToast('全部数据已清空');
    }

    document.querySelectorAll('button[data-field]').forEach(btn => {
      btn.addEventListener('click', () => record(btn.dataset.field));
    });

    document.getElementById('showBtn').addEventListener('click', () => {
      document.getElementById('recordsCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
      showToast('已显示最近21天');
    });

    document.getElementById('exportBtn').addEventListener('click', exportBackup);
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });
    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) importBackup(file);
      e.target.value = '';
    });
    document.getElementById('clearBtn').addEventListener('click', clearAllData);

    refreshButtons();
    renderTodayInfo();
    renderTable();
  </script>
</body>
</html>
