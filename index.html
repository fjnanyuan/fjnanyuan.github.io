<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>每日记录</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #6a7386;
      --line: #e7ebf3;
      --shadow: 0 10px 28px rgba(25, 39, 75, 0.08);
      --disabled-bg: #d9dde6;
      --disabled-text: #7d8797;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f7f9fd 0%, #eff4fb 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 14px 36px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(231, 235, 243, 0.95);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub {
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
    }

    .today {
      margin-top: 10px;
      font-size: 15px;
      color: #334155;
      font-weight: 600;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #30415c;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .btn-grid.more-grid {
      margin-top: 12px;
    }

    .btn {
      position: relative;
      border: none;
      border-radius: 20px;
      min-height: 94px;
      padding: 14px 12px;
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .06s ease, filter .18s ease, opacity .18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .btn:active { transform: scale(0.985); }

    .btn:disabled {
      cursor: not-allowed;
      background: var(--disabled-bg) !important;
      color: var(--disabled-text) !important;
      transform: none;
      box-shadow: none;
    }

    .btn-title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: 0.2px;
    }

    .btn-time {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 700;
      opacity: 0.92;
      min-height: 20px;
    }

    .btn-hint {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.78;
    }

    .tone-a { background: linear-gradient(180deg, #6ea8fe 0%, #4e89f0 100%); color: #fff; }
    .tone-b { background: linear-gradient(180deg, #8f7cff 0%, #7262f8 100%); color: #fff; }
    .tone-c { background: linear-gradient(180deg, #49c5b6 0%, #26a99a 100%); color: #fff; }
    .tone-d { background: linear-gradient(180deg, #ffaf65 0%, #f08a2f 100%); color: #fff; }
    .tone-e { background: linear-gradient(180deg, #ff8ba5 0%, #f26d8a 100%); color: #fff; }
    .tone-f { background: linear-gradient(180deg, #7cc98b 0%, #58b56a 100%); color: #fff; }
    .tone-g { background: linear-gradient(180deg, #8aa3b8 0%, #6f8598 100%); color: #fff; }
    .tone-h { background: linear-gradient(180deg, #c587ff 0%, #a965f3 100%); color: #fff; }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .toolbar-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .tool-btn {
      border: none;
      min-height: 56px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .tool-btn.light {
      background: #eef4ff;
      color: #28436f;
      border: 1px solid #dbe7fd;
    }

    .tool-btn.warn {
      background: #ffe9e8;
      color: #8c2727;
      border: 1px solid #ffd2d0;
    }

    .more-panel {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .more-panel.open { display: block; }

    .log {
      display: none;
      margin-top: 14px;
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .log.open { display: block; }

    table {
      width: 100%;
      min-width: 1240px;
      border-collapse: collapse;
      background: #fff;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f6f8fc;
      color: #3a4960;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 11px 10px;
      text-align: center;
      white-space: nowrap;
      font-size: 14px;
    }

    tr:last-child td { border-bottom: none; }
    th:last-child, td:last-child { border-right: none; }

    thead th:first-child,
    tbody td:first-child {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #fff;
    }

    thead th:first-child {
      background: #f6f8fc;
      z-index: 3;
    }

    .tip {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(16px);
      background: rgba(20, 28, 45, 0.92);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all .18s ease;
      max-width: calc(100vw - 30px);
      text-align: center;
      z-index: 99;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 480px) {
      .wrap { padding: 14px 12px 28px; }
      .btn { min-height: 90px; }
      .btn-title { font-size: 18px; }
      .btn-time { font-size: 15px; }
      .tool-btn { min-height: 52px; font-size: 16px; }
      .toolbar-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>每日记录</h1>
      <div class="sub">日本时间自动记录。当天按过的项目会自动变灰并锁定。数据只保存在这台 iPhone 的浏览器本地，不会上传到 GitHub。</div>
      <div class="today" id="todayInfo"></div>
      <div class="muted" id="todayMiniSummary"></div>
    </div>

    <div class="card">
      <div class="section-title">主按钮</div>
      <div class="btn-grid" id="mainButtons"></div>

      <div class="toolbar">
        <button class="tool-btn light" id="toggleMoreBtn">更多</button>
        <button class="tool-btn light" id="toggleLogBtn">显示最近21天</button>
      </div>

      <div class="more-panel" id="morePanel">
        <div class="section-title">更多</div>
        <div class="btn-grid more-grid" id="moreButtons"></div>
      </div>

      <div class="toolbar-3">
        <button class="tool-btn light" id="exportBtn">导出备份</button>
        <label class="tool-btn light file-label" for="importInput">导入备份</label>
        <button class="tool-btn warn" id="clearBtn">清空全部数据</button>
      </div>
      <input id="importInput" type="file" accept="application/json" style="display:none;" />

      <div class="tip">说明：健身前睡觉总时间 = 健身前睡了 到 健身前醒了。拉了多久 = 开始拉了 到 拉了结束。若结束时间早于开始时间，会按跨天处理。</div>

      <div class="log" id="logSection">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>健身前睡了</th>
              <th>健身前醒了</th>
              <th>健身前睡觉总时间</th>
              <th>出门健身了</th>
              <th>躺下了</th>
              <th>入睡</th>
              <th>二次入睡</th>
              <th>开始拉了</th>
              <th>拉了结束</th>
              <th>拉了多久</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'daily_record_app_v4';
    const TIME_ZONE = 'Asia/Tokyo';
    const DAYS_TO_SHOW = 21;

    const MAIN_FIELDS = [
      { key: 'preGymSleep', label: '健身前睡了', className: 'tone-a' },
      { key: 'preGymWake', label: '健身前醒了', className: 'tone-b' },
      { key: 'gymOut', label: '出门健身了', className: 'tone-c' },
      { key: 'lieDown', label: '躺下了', className: 'tone-d' },
      { key: 'sleep', label: '入睡', className: 'tone-e' },
      { key: 'secondSleep', label: '二次入睡', className: 'tone-f' }
    ];

    const MORE_FIELDS = [
      { key: 'poopStart', label: '开始拉了', className: 'tone-g' },
      { key: 'poopEnd', label: '拉了结束', className: 'tone-h' }
    ];

    const ALL_FIELDS = [...MAIN_FIELDS, ...MORE_FIELDS];
    const FIELD_MAP = Object.fromEntries(ALL_FIELDS.map(item => [item.key, item]));

    function getFormatterParts(date = new Date()) {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIME_ZONE,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).formatToParts(date);
      const map = {};
      for (const part of parts) {
        if (part.type !== 'literal') map[part.type] = part.value;
      }
      return map;
    }

    function getCurrentTokyoInfo() {
      const p = getFormatterParts();
      return {
        dateKey: `${p.year}-${p.month}-${p.day}`,
        timeText: `${p.hour}:${p.minute}`
      };
    }

    function getTokyoDateKeyFromDate(date) {
      const p = getFormatterParts(date);
      return `${p.year}-${p.month}-${p.day}`;
    }

    function getRecentDateKeys(days = DAYS_TO_SHOW) {
      const base = new Date();
      const list = [];
      for (let i = 0; i < days; i++) {
        const d = new Date(base);
        d.setDate(base.getDate() - i);
        list.push(getTokyoDateKeyFromDate(d));
      }
      return list;
    }

    function loadData() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return raw && typeof raw === 'object' && !Array.isArray(raw) ? raw : {};
      } catch {
        return {};
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function createEmptyDay() {
      return {
        preGymSleep: '',
        preGymWake: '',
        gymOut: '',
        lieDown: '',
        sleep: '',
        secondSleep: '',
        poopStart: '',
        poopEnd: ''
      };
    }

    function ensureDayRecord(data, dateKey) {
      if (!data[dateKey] || typeof data[dateKey] !== 'object') {
        data[dateKey] = createEmptyDay();
      } else {
        data[dateKey] = { ...createEmptyDay(), ...data[dateKey] };
      }
      return data[dateKey];
    }

    function pruneOldData(data) {
      const keep = new Set(getRecentDateKeys(DAYS_TO_SHOW + 10));
      Object.keys(data).forEach(key => {
        if (!keep.has(key)) delete data[key];
      });
    }

    function getWeekdayJa(dateKey) {
      const [year, month, day] = dateKey.split('-').map(Number);
      const weekday = new Date(Date.UTC(year, month - 1, day)).getUTCDay();
      return ['日', '月', '火', '水', '木', '金', '土'][weekday];
    }

    function formatDateLabel(dateKey) {
      const [year, month, day] = dateKey.split('-');
      return `${year}/${month}/${day}（${getWeekdayJa(dateKey)}）`;
    }

    function parseHHMM(text) {
      if (!text || !/^\d{2}:\d{2}$/.test(text)) return null;
      const [h, m] = text.split(':').map(Number);
      return h * 60 + m;
    }

    function formatDuration(mins) {
      if (mins == null || Number.isNaN(mins)) return '无数据';
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return `${h}小时${String(m).padStart(2, '0')}分`;
    }

    function calculateDuration(startText, endText) {
      const start = parseHHMM(startText);
      const end = parseHHMM(endText);
      if (start == null || end == null) return '无数据';
      let delta = end - start;
      if (delta < 0) delta += 24 * 60;
      return formatDuration(delta);
    }

    function valueOrNone(v) {
      return v || '无数据';
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function makeRecordButton(item) {
      const button = document.createElement('button');
      button.className = `btn record-btn ${item.className}`;
      button.type = 'button';
      button.dataset.field = item.key;
      button.innerHTML = `
        <div class="btn-title">${item.label}</div>
        <div class="btn-time">未记录</div>
        <div class="btn-hint">点一下自动记录日本时间</div>
      `;
      button.addEventListener('click', () => recordField(item.key));
      return button;
    }

    function buildButtons() {
      const main = document.getElementById('mainButtons');
      const more = document.getElementById('moreButtons');
      main.innerHTML = '';
      more.innerHTML = '';
      MAIN_FIELDS.forEach(item => main.appendChild(makeRecordButton(item)));
      MORE_FIELDS.forEach(item => more.appendChild(makeRecordButton(item)));
    }

    function updateButtonStates() {
      const { dateKey } = getCurrentTokyoInfo();
      const data = loadData();
      const day = ensureDayRecord(data, dateKey);
      saveData(data);

      document.querySelectorAll('.record-btn').forEach(btn => {
        const field = btn.dataset.field;
        const value = day[field] || '';
        const timeEl = btn.querySelector('.btn-time');
        timeEl.textContent = value || '未记录';
        btn.disabled = Boolean(value);
      });
    }

    function recordField(field) {
      const data = loadData();
      const { dateKey, timeText } = getCurrentTokyoInfo();
      const day = ensureDayRecord(data, dateKey);

      if (day[field]) {
        showToast(`今天的“${FIELD_MAP[field].label}”已记录`);
        updateButtonStates();
        return;
      }

      day[field] = timeText;
      pruneOldData(data);
      saveData(data);
      updateButtonStates();
      renderTodayInfo();
      renderHistory();
      showToast(`已记录：${FIELD_MAP[field].label} ${timeText}`);
    }

    function renderTodayInfo() {
      const { dateKey } = getCurrentTokyoInfo();
      const data = loadData();
      const day = ensureDayRecord(data, dateKey);
      saveData(data);

      document.getElementById('todayInfo').textContent = `今天：${formatDateLabel(dateKey)}`;
      document.getElementById('todayMiniSummary').textContent = [
        `健身前睡了 ${valueOrNone(day.preGymSleep)}`,
        `健身前醒了 ${valueOrNone(day.preGymWake)}`,
        `出门健身了 ${valueOrNone(day.gymOut)}`,
        `入睡 ${valueOrNone(day.sleep)}`
      ].join(' ｜ ');
    }

    function renderHistory() {
      const body = document.getElementById('historyBody');
      const data = loadData();
      const keys = getRecentDateKeys(DAYS_TO_SHOW);
      body.innerHTML = keys.map(dateKey => {
        const day = ensureDayRecord(data, dateKey);
        return `
          <tr>
            <td>${formatDateLabel(dateKey)}</td>
            <td>${valueOrNone(day.preGymSleep)}</td>
            <td>${valueOrNone(day.preGymWake)}</td>
            <td>${calculateDuration(day.preGymSleep, day.preGymWake)}</td>
            <td>${valueOrNone(day.gymOut)}</td>
            <td>${valueOrNone(day.lieDown)}</td>
            <td>${valueOrNone(day.sleep)}</td>
            <td>${valueOrNone(day.secondSleep)}</td>
            <td>${valueOrNone(day.poopStart)}</td>
            <td>${valueOrNone(day.poopEnd)}</td>
            <td>${calculateDuration(day.poopStart, day.poopEnd)}</td>
          </tr>
        `;
      }).join('');
      saveData(data);
    }

    function toggleMore() {
      const panel = document.getElementById('morePanel');
      const btn = document.getElementById('toggleMoreBtn');
      const open = panel.classList.toggle('open');
      btn.textContent = open ? '收起更多' : '更多';
    }

    function toggleLog() {
      const section = document.getElementById('logSection');
      const btn = document.getElementById('toggleLogBtn');
      const open = section.classList.toggle('open');
      btn.textContent = open ? '收起最近21天' : '显示最近21天';
      if (open) renderHistory();
    }

    function exportData() {
      const data = loadData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const { dateKey } = getCurrentTokyoInfo();
      link.href = url;
      link.download = `daily-record-backup-${dateKey}.json`;
      link.click();
      URL.revokeObjectURL(url);
      showToast('已导出备份');
    }

    function importDataFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!imported || typeof imported !== 'object' || Array.isArray(imported)) {
            throw new Error('bad');
          }
          saveData(imported);
          updateButtonStates();
          renderTodayInfo();
          renderHistory();
          showToast('已导入备份');
        } catch {
          showToast('导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function clearAllData() {
      if (!confirm('确定要清空全部记录吗？这个操作不能撤销。')) return;
      localStorage.removeItem(STORAGE_KEY);
      updateButtonStates();
      renderTodayInfo();
      renderHistory();
      showToast('已清空全部数据');
    }

    document.getElementById('toggleMoreBtn').addEventListener('click', toggleMore);
    document.getElementById('toggleLogBtn').addEventListener('click', toggleLog);
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('clearBtn').addEventListener('click', clearAllData);
    document.getElementById('importInput').addEventListener('change', (e) => {
      importDataFromFile(e.target.files[0]);
      e.target.value = '';
    });

    buildButtons();
    updateButtonStates();
    renderTodayInfo();
    renderHistory();
  </script>
</body>
</html>
