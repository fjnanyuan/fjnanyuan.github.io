<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>每日记录</title>
  <style>
    :root {
      --bg1: #f8fafc;
      --bg2: #eef2ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
      --radius: 18px;
      --disabled: #cfd5df;
      --disabled-text: #667085;
      --danger-row: #ffe4e6;
      --danger-cell: #fecdd3;
      --danger-text: #9f1239;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 18px;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 14px 0 34px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub,
    .muted,
    .tip {
      color: var(--muted);
      line-height: 1.55;
    }

    .sub { font-size: 14px; }
    .muted, .tip { font-size: 13px; }

    .today {
      font-size: 16px;
      font-weight: 800;
      margin-top: 10px;
    }

    .summary {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.65;
      color: #374151;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 12px;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      min-height: 96px;
      padding: 12px;
      font-size: 22px;
      font-weight: 800;
      color: #172033;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.10);
      transition: transform 0.08s ease, filter 0.2s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
    }

    button:active { transform: scale(0.98); }

    button:disabled {
      background: var(--disabled) !important;
      color: var(--disabled-text) !important;
      cursor: not-allowed;
      box-shadow: none;
      opacity: 1;
    }

    .btn-title {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .btn-time {
      display: block;
      margin-top: 8px;
      font-size: 16px;
      font-weight: 700;
      opacity: 0.92;
      min-height: 20px;
    }

    .btn-hint {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0.85;
    }

    .tone-a { background: linear-gradient(180deg, #fde68a, #fcd34d); }
    .tone-b { background: linear-gradient(180deg, #bfdbfe, #93c5fd); }
    .tone-c { background: linear-gradient(180deg, #c7f9cc, #86efac); }
    .tone-d { background: linear-gradient(180deg, #ddd6fe, #c4b5fd); }
    .tone-e { background: linear-gradient(180deg, #fecdd3, #fda4af); }
    .tone-f { background: linear-gradient(180deg, #bae6fd, #7dd3fc); }
    .tone-g { background: linear-gradient(180deg, #fed7aa, #fdba74); }
    .tone-h { background: linear-gradient(180deg, #fecaca, #fca5a5); }
    .tone-i { background: linear-gradient(180deg, #fca5a5, #fb7185); color: #4c0519; }

    .toolbar,
    .toolbar-3,
    .note-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .tool-btn {
      min-height: 58px;
      font-size: 19px;
      font-weight: 800;
      border-radius: 16px;
      background: linear-gradient(180deg, #e9efff, #dbeafe);
      color: #172033;
    }

    .tool-btn.warn { background: linear-gradient(180deg, #fee2e2, #fecaca); }

    .more-panel,
    .log {
      margin-top: 12px;
      display: none;
    }

    .more-panel.open,
    .log.open { display: block; }

    .note-wrap {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border: 1px solid #d8deea;
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      color: var(--text);
      background: #fbfcff;
      outline: none;
    }

    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147,197,253,0.25);
    }

    .today-note {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .history-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 10px;
    }

    table {
      width: 100%;
      min-width: 1460px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
      background: #fff;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 2;
      font-size: 13px;
    }

    thead th:first-child,
    tbody td:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      background: #fff;
    }

    thead th:first-child {
      background: #f8fafc;
      z-index: 4;
    }

    td:last-child,
    th:last-child {
      white-space: normal;
      min-width: 220px;
    }

    tr.crash-row td {
      background: var(--danger-row);
      color: var(--danger-text);
    }

    tr.crash-row td:first-child {
      background: var(--danger-cell);
      font-weight: 800;
    }

    .tag-crash {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #fecdd3;
      color: #9f1239;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(16px);
      background: rgba(20, 28, 45, 0.92);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: all .18s ease;
      max-width: calc(100vw - 30px);
      text-align: center;
      z-index: 99;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 700px) {
      .toolbar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .note-row { grid-template-columns: 1fr 180px; align-items: start; }
    }

    @media (max-width: 640px) {
      h1 { font-size: 24px; }
      .btn-title { font-size: 18px; }
      .btn-time { font-size: 15px; }
      .tool-btn { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>每日记录</h1>
      <div class="sub">适合 iPhone Safari 使用，时间自动按日本时间记录。当天按过的按钮会变灰，不能重复点击。</div>
      <div class="today" id="todayInfo"></div>
      <div class="summary" id="todayMiniSummary"></div>
    </div>

    <div class="card">
      <div class="section-title">今天的按钮</div>
      <div class="btn-grid">
        <button class="tone-a record-btn" data-field="preGymSleep">
          <span class="btn-title">健身前睡了</span>
          <span class="btn-time">未记录</span>
          <span class="btn-hint">点一下自动记时间</span>
        </button>
        <button class="tone-b record-btn" data-field="preGymWake">
          <span class="btn-title">健身前醒了</span>
          <span class="btn-time">未记录</span>
          <span class="btn-hint">点一下自动记时间</span>
        </button>
        <button class="tone-c record-btn" data-field="gymOut">
          <span class="btn-title">出门健身了</span>
          <span class="btn-time">未记录</span>
          <span class="btn-hint">点一下自动记时间</span>
        </button>
        <button class="tone-d record-btn" data-field="lieDown">
          <span class="btn-title">躺下了</span>
          <span class="btn-time">未记录</span>
          <span class="btn-hint">点一下自动记时间</span>
        </button>
        <button class="tone-e record-btn" data-field="sleep">
          <span class="btn-title">入睡</span>
          <span class="btn-time">未记录</span>
          <span class="btn-hint">点一下自动记时间</span>
        </button>
        <button class="tone-f record-btn" data-field="secondSleep">
          <span class="btn-title">二次入睡</span>
          <span class="btn-time">未记录</span>
          <span class="btn-hint">点一下自动记时间</span>
        </button>
      </div>

      <div class="toolbar">
        <button class="tool-btn" id="toggleMoreBtn">更多</button>
        <button class="tool-btn" id="toggleLogBtn">显示最近21天</button>
      </div>

      <div class="more-panel" id="morePanel">
        <div class="btn-grid">
          <button class="tone-g record-btn" data-field="poopStart">
            <span class="btn-title">开始拉了</span>
            <span class="btn-time">未记录</span>
            <span class="btn-hint">点一下自动记时间</span>
          </button>
          <button class="tone-h record-btn" data-field="poopEnd">
            <span class="btn-title">拉了结束</span>
            <span class="btn-time">未记录</span>
            <span class="btn-hint">点一下自动记时间</span>
          </button>
          <button class="tone-i record-btn" data-field="crashed">
            <span class="btn-title">崩了</span>
            <span class="btn-time">未记录</span>
            <span class="btn-hint">失眠那天点一次</span>
          </button>
        </div>
      </div>

      <div class="note-wrap">
        <div class="section-title">备注</div>
        <div class="note-row">
          <textarea id="noteInput" placeholder="例如：今天状态有点累，腿比较酸。再次保存会自动追加到后面。"></textarea>
          <button class="tool-btn" id="saveNoteBtn">保存备注</button>
        </div>
        <div class="tip">备注会保存到今天，并显示在最近21天表格最后一列。备注可反复保存，新的内容会自动追加。</div>
        <div class="today-note" id="todayNotePreview">今天备注：无数据</div>
      </div>

      <div class="toolbar-3">
        <button class="tool-btn" id="exportBtn">导出备份</button>
        <label class="tool-btn" style="display:flex;align-items:center;justify-content:center;">
          导入备份
          <input id="importInput" type="file" accept="application/json" style="display:none" />
        </label>
        <button class="tool-btn warn" id="clearBtn">清空全部数据</button>
      </div>

      <div class="tip">说明：表格里“健身前睡觉总时间”= 健身前睡了 到 健身前醒了；“拉了多久”= 开始拉了 到 拉了结束。若跨过零点，会自动按隔天计算。按了“崩了”的那一天会整行变红。</div>

      <div class="log" id="logSection">
        <div class="history-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>健身前睡了</th>
                <th>健身前醒了</th>
                <th>健身前睡觉总时间</th>
                <th>出门健身了</th>
                <th>躺下了</th>
                <th>入睡</th>
                <th>二次入睡</th>
                <th>开始拉了</th>
                <th>拉了结束</th>
                <th>拉了多久</th>
                <th>崩了</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'daily_tracker_jst_v4';
    const DAYS_TO_SHOW = 21;
    const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];

    const FIELD_MAP = {
      preGymSleep: { label: '健身前睡了' },
      preGymWake: { label: '健身前醒了' },
      gymOut: { label: '出门健身了' },
      lieDown: { label: '躺下了' },
      sleep: { label: '入睡' },
      secondSleep: { label: '二次入睡' },
      poopStart: { label: '开始拉了' },
      poopEnd: { label: '拉了结束' },
      crashed: { label: '崩了' }
    };

    let toastTimer = null;

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const data = raw ? JSON.parse(raw) : {};
        return data && typeof data === 'object' && !Array.isArray(data) ? data : {};
      } catch (e) {
        return {};
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function nowPartsJST(date = new Date()) {
      const formatter = new Intl.DateTimeFormat('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      const parts = Object.fromEntries(formatter.formatToParts(date).map(p => [p.type, p.value]));
      return {
        year: parts.year,
        month: parts.month,
        day: parts.day,
        hour: parts.hour,
        minute: parts.minute
      };
    }

    function getCurrentTokyoInfo() {
      const p = nowPartsJST();
      return {
        dateKey: `${p.year}-${p.month}-${p.day}`,
        timeText: `${p.hour}:${p.minute}`
      };
    }

    function ensureDayRecord(data, dateKey) {
      if (!data[dateKey] || typeof data[dateKey] !== 'object') {
        data[dateKey] = {
          preGymSleep: '',
          preGymWake: '',
          gymOut: '',
          lieDown: '',
          sleep: '',
          secondSleep: '',
          poopStart: '',
          poopEnd: '',
          crashed: '',
          note: ''
        };
      }
      const day = data[dateKey];
      if (typeof day.note !== 'string') day.note = '';
      Object.keys(FIELD_MAP).forEach(key => {
        if (typeof day[key] !== 'string') day[key] = '';
      });
      return day;
    }

    function pruneOldData(data) {
      const keepKeys = new Set(getRecentDateKeys(DAYS_TO_SHOW));
      Object.keys(data).forEach(key => {
        if (!keepKeys.has(key)) delete data[key];
      });
    }

    function getRecentDateKeys(days = 21) {
      const keys = [];
      const base = nowPartsJST();
      const utcBase = Date.UTC(Number(base.year), Number(base.month) - 1, Number(base.day), 0, 0, 0);
      for (let i = 0; i < days; i++) {
        const d = new Date(utcBase - i * 24 * 60 * 60 * 1000);
        const y = d.getUTCFullYear();
        const m = String(d.getUTCMonth() + 1).padStart(2, '0');
        const day = String(d.getUTCDate()).padStart(2, '0');
        keys.push(`${y}-${m}-${day}`);
      }
      return keys;
    }

    function formatDateLabel(dateKey) {
      const [y, m, d] = dateKey.split('-').map(Number);
      const utcMs = Date.UTC(y, m - 1, d, 0, 0, 0);
      const weekday = WEEKDAYS[new Date(utcMs).getUTCDay()];
      return `${m}/${d}（${weekday}）`;
    }

    function parseTime(str) {
      if (!str || typeof str !== 'string' || !str.includes(':')) return null;
      const [h, m] = str.split(':').map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return null;
      return h * 60 + m;
    }

    function calculateDuration(startTime, endTime) {
      const start = parseTime(startTime);
      const end = parseTime(endTime);
      if (start == null || end == null) return '无数据';
      let diff = end - start;
      if (diff < 0) diff += 24 * 60;
      const h = Math.floor(diff / 60);
      const m = diff % 60;
      return `${h}小时${m}分`;
    }

    function valueOrNone(value) {
      return value && String(value).trim() ? String(value).trim() : '无数据';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(text) {
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    function updateButtonStates() {
      const { dateKey } = getCurrentTokyoInfo();
      const data = loadData();
      const day = ensureDayRecord(data, dateKey);
      saveData(data);

      document.querySelectorAll('.record-btn').forEach(btn => {
        const field = btn.dataset.field;
        const value = day[field] || '';
        const timeEl = btn.querySelector('.btn-time');
        if (field === 'crashed') {
          timeEl.textContent = value ? `已记录 ${value}` : '未记录';
        } else {
          timeEl.textContent = value || '未记录';
        }
        btn.disabled = Boolean(value);
      });
    }

    function renderTodayInfo() {
      const { dateKey } = getCurrentTokyoInfo();
      const data = loadData();
      const day = ensureDayRecord(data, dateKey);
      saveData(data);

      document.getElementById('todayInfo').textContent = `今天：${formatDateLabel(dateKey)}`;
      document.getElementById('todayMiniSummary').textContent = [
        `健身前睡了 ${valueOrNone(day.preGymSleep)}`,
        `健身前醒了 ${valueOrNone(day.preGymWake)}`,
        `出门健身了 ${valueOrNone(day.gymOut)}`,
        `入睡 ${valueOrNone(day.sleep)}`,
        `崩了 ${day.crashed ? '是' : '否'}`
      ].join(' ｜ ');
      document.getElementById('todayNotePreview').textContent = `今天备注：${valueOrNone(day.note)}`;
    }

    function renderHistory() {
      const body = document.getElementById('historyBody');
      const data = loadData();
      const keys = getRecentDateKeys(DAYS_TO_SHOW);
      body.innerHTML = keys.map(dateKey => {
        const day = ensureDayRecord(data, dateKey);
        const crashed = Boolean(day.crashed);
        return `
          <tr class="${crashed ? 'crash-row' : ''}">
            <td>${formatDateLabel(dateKey)}</td>
            <td>${valueOrNone(day.preGymSleep)}</td>
            <td>${valueOrNone(day.preGymWake)}</td>
            <td>${calculateDuration(day.preGymSleep, day.preGymWake)}</td>
            <td>${valueOrNone(day.gymOut)}</td>
            <td>${valueOrNone(day.lieDown)}</td>
            <td>${valueOrNone(day.sleep)}</td>
            <td>${valueOrNone(day.secondSleep)}</td>
            <td>${valueOrNone(day.poopStart)}</td>
            <td>${valueOrNone(day.poopEnd)}</td>
            <td>${calculateDuration(day.poopStart, day.poopEnd)}</td>
            <td>${crashed ? '<span class="tag-crash">崩了</span>' : '无数据'}</td>
            <td>${escapeHtml(valueOrNone(day.note))}</td>
          </tr>
        `;
      }).join('');
      saveData(data);
    }

    function recordField(field) {
      const data = loadData();
      const { dateKey, timeText } = getCurrentTokyoInfo();
      const day = ensureDayRecord(data, dateKey);

      if (day[field]) {
        showToast(`今天的“${FIELD_MAP[field].label}”已记录`);
        updateButtonStates();
        return;
      }

      day[field] = timeText;
      pruneOldData(data);
      saveData(data);
      updateButtonStates();
      renderTodayInfo();
      renderHistory();
      showToast(`已记录：${FIELD_MAP[field].label} ${timeText}`);
    }

    function saveNote() {
      const input = document.getElementById('noteInput');
      const text = input.value.trim();
      if (!text) {
        showToast('请先输入备注');
        return;
      }
      const data = loadData();
      const { dateKey } = getCurrentTokyoInfo();
      const day = ensureDayRecord(data, dateKey);
      day.note = day.note ? `${day.note} / ${text}` : text;
      pruneOldData(data);
      saveData(data);
      input.value = '';
      renderTodayInfo();
      renderHistory();
      showToast('备注已追加保存');
    }

    function toggleMore() {
      const panel = document.getElementById('morePanel');
      const btn = document.getElementById('toggleMoreBtn');
      const open = panel.classList.toggle('open');
      btn.textContent = open ? '收起更多' : '更多';
    }

    function toggleLog() {
      const section = document.getElementById('logSection');
      const btn = document.getElementById('toggleLogBtn');
      const open = section.classList.toggle('open');
      btn.textContent = open ? '收起最近21天' : '显示最近21天';
      if (open) renderHistory();
    }

    function exportData() {
      const data = loadData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const { dateKey } = getCurrentTokyoInfo();
      link.href = url;
      link.download = `daily-record-backup-${dateKey}.json`;
      link.click();
      URL.revokeObjectURL(url);
      showToast('已导出备份');
    }

    function importDataFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!imported || typeof imported !== 'object' || Array.isArray(imported)) throw new Error('bad');
          Object.keys(imported).forEach(key => ensureDayRecord(imported, key));
          pruneOldData(imported);
          saveData(imported);
          updateButtonStates();
          renderTodayInfo();
          renderHistory();
          showToast('已导入备份');
        } catch (e) {
          showToast('导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function clearAllData() {
      if (!confirm('确定要清空全部记录吗？这个操作不能撤销。')) return;
      localStorage.removeItem(STORAGE_KEY);
      updateButtonStates();
      renderTodayInfo();
      renderHistory();
      showToast('已清空全部数据');
    }

    document.querySelectorAll('.record-btn').forEach(btn => {
      btn.addEventListener('click', () => recordField(btn.dataset.field));
    });
    document.getElementById('toggleMoreBtn').addEventListener('click', toggleMore);
    document.getElementById('toggleLogBtn').addEventListener('click', toggleLog);
    document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('clearBtn').addEventListener('click', clearAllData);
    document.getElementById('importInput').addEventListener('change', (e) => {
      importDataFromFile(e.target.files[0]);
      e.target.value = '';
    });

    updateButtonStates();
    renderTodayInfo();
    renderHistory();
  </script>
</body>
</html>
