<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>每日时间记录</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
      --radius: 18px;
      --disabled: #cfd5df;
      --disabled-text: #667085;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 18px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 14px 0 30px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub, .muted {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .today {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .extra-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 18px;
      min-height: 90px;
      padding: 10px 12px;
      font-size: 22px;
      font-weight: 800;
      color: #172033;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.10);
      transition: transform 0.08s ease, filter 0.2s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.98); }

    button:disabled {
      background: var(--disabled) !important;
      color: var(--disabled-text) !important;
      cursor: not-allowed;
      box-shadow: none;
      opacity: 1;
    }

    .btn-label {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .btn-time {
      display: block;
      margin-top: 8px;
      font-size: 16px;
      font-weight: 700;
      opacity: 0.9;
      min-height: 20px;
    }

    .c1 { background: linear-gradient(180deg, #fde68a, #fcd34d); }
    .c2 { background: linear-gradient(180deg, #bfdbfe, #93c5fd); }
    .c3 { background: linear-gradient(180deg, #c7f9cc, #86efac); }
    .c4 { background: linear-gradient(180deg, #fecdd3, #fda4af); }
    .c5 { background: linear-gradient(180deg, #ddd6fe, #c4b5fd); }
    .c6 { background: linear-gradient(180deg, #bae6fd, #7dd3fc); }
    .c7 { background: linear-gradient(180deg, #fed7aa, #fdba74); }
    .c8 { background: linear-gradient(180deg, #fecaca, #fca5a5); }

    .top-actions,
    .tools {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .action-btn,
    .small-btn {
      min-height: 58px;
      font-size: 19px;
      font-weight: 800;
      border-radius: 16px;
      background: linear-gradient(180deg, #e9efff, #dbeafe);
    }

    .small-btn.warn { background: linear-gradient(180deg, #fee2e2, #fecaca); }
    .small-btn.neutral { background: linear-gradient(180deg, #f3f4f6, #e5e7eb); }

    .status {
      margin-top: 12px;
      min-height: 22px;
      font-weight: 700;
      font-size: 14px;
    }

    .ok { color: #15803d; }
    .warn-text { color: #b45309; }

    .summary-line {
      font-size: 15px;
      line-height: 1.7;
      margin-top: 8px;
    }

    .summary-line b { font-weight: 800; }

    .note-box {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    textarea {
      width: 100%;
      min-height: 88px;
      resize: vertical;
      border: 1px solid #d8deea;
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      color: var(--text);
      background: #fbfcff;
      outline: none;
    }

    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147,197,253,0.25);
    }

    .note-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .today-note {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.6;
      color: #374151;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .history-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 10px;
    }

    table {
      width: 100%;
      min-width: 1320px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
      font-size: 13px;
    }

    td:last-child, th:last-child {
      white-space: normal;
      min-width: 220px;
    }

    .foot {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .hidden { display: none; }

    @media (min-width: 700px) {
      .top-actions,
      .tools,
      .note-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .tools.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>每日时间记录</h1>
      <div class="sub">日本时间自动记录。主按钮当天按过一次就会变灰并锁定。数据只保存在你自己的浏览器本地。</div>
      <div class="today" id="todayLabel"></div>
      <div class="summary-line" id="todaySummary"></div>
      <div class="today-note" id="todayNote"></div>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <div class="grid" id="mainButtons"></div>
      <div class="top-actions">
        <button class="action-btn" id="toggleMoreBtn" type="button">更多</button>
        <button class="action-btn" id="toggleViewBtn" type="button">显示最近21天</button>
      </div>
      <div class="extra-grid hidden" id="extraButtons"></div>

      <div class="note-box">
        <div style="font-weight:800; margin-bottom:8px;">备注（追加模式）</div>
        <div class="muted">同一天再次保存备注时，会自动接在后面，不会覆盖之前的内容。</div>
        <textarea id="noteInput" placeholder="例如：今天有点累 / 腿很酸 / 状态不错"></textarea>
        <div class="note-actions">
          <button class="small-btn" id="saveNoteBtn" type="button">保存备注</button>
          <button class="small-btn neutral" id="clearNoteInputBtn" type="button">清空输入框</button>
        </div>
      </div>
    </div>

    <div class="card hidden" id="historyCard">
      <div style="font-size:18px; font-weight:800;">最近21天</div>
      <div class="history-wrap">
        <table>
          <thead>
            <tr>
              <th>日期</th>
              <th>健身前睡了</th>
              <th>健身前醒了</th>
              <th>健身前睡觉总时间</th>
              <th>出门健身了</th>
              <th>躺下了</th>
              <th>入睡</th>
              <th>二次入睡</th>
              <th>开始拉了</th>
              <th>拉了结束</th>
              <th>拉了多久</th>
              <th>备注</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
      <div class="foot">说明：同一天同一个记录按钮只能按一次。备注可以多次保存，后续内容会追加到当天备注后面。</div>
    </div>

    <div class="card">
      <div style="font-size:18px; font-weight:800; margin-bottom:10px;">数据工具</div>
      <div class="tools three">
        <button class="small-btn" id="exportBtn" type="button">导出备份</button>
        <button class="small-btn" id="importBtn" type="button">导入备份</button>
        <button class="small-btn warn" id="clearBtn" type="button">清空全部数据</button>
      </div>
      <input id="importFile" type="file" accept="application/json" class="hidden" />
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'daily_tracker_tokyo_v6';
    const DAYS_TO_SHOW = 21;
    const TOKYO_TZ = 'Asia/Tokyo';
    const WEEKDAYS_JP = ['日', '月', '火', '水', '木', '金', '土'];

    const MAIN_EVENTS = [
      { key: 'preSleep', label: '健身前睡了', color: 'c1' },
      { key: 'preWake', label: '健身前醒了', color: 'c2' },
      { key: 'goGym', label: '出门健身了', color: 'c3' },
      { key: 'lieDown', label: '躺下了', color: 'c4' },
      { key: 'sleep', label: '入睡', color: 'c5' },
      { key: 'secondSleep', label: '二次入睡', color: 'c6' }
    ];

    const EXTRA_EVENTS = [
      { key: 'poopStart', label: '开始拉了', color: 'c7' },
      { key: 'poopEnd', label: '拉了结束', color: 'c8' }
    ];

    const ALL_EVENTS = [...MAIN_EVENTS, ...EXTRA_EVENTS];
    const EVENT_LABELS = Object.fromEntries(ALL_EVENTS.map(item => [item.key, item.label]));

    function makeButtonHtml(item) {
      return `
        <button type="button" class="${item.color}" data-event="${item.key}" id="btn-${item.key}">
          <span class="btn-label">${item.label}</span>
          <span class="btn-time"></span>
        </button>
      `;
    }

    document.getElementById('mainButtons').innerHTML = MAIN_EVENTS.map(makeButtonHtml).join('');
    document.getElementById('extraButtons').innerHTML = EXTRA_EVENTS.map(makeButtonHtml).join('');

    function getTokyoNowParts() {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: TOKYO_TZ,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).formatToParts(new Date());
      const map = Object.fromEntries(parts.filter(p => p.type !== 'literal').map(p => [p.type, p.value]));
      return {
        year: Number(map.year),
        month: Number(map.month),
        day: Number(map.day),
        hour: Number(map.hour),
        minute: Number(map.minute),
        dateKey: `${map.year}-${map.month}-${map.day}`.replace(/-(\d)(?=-|$)/g, '-0$1'),
        timeText: `${map.hour}:${map.minute}`.replace(/\b(\d):/,'0$1:').replace(/:(\d)$/,':0$1')
      };
    }

    function getCurrentDateKeyAndTime() {
      const now = getTokyoNowParts();
      return { dateKey: now.dateKey, timeText: now.timeText };
    }

    function parseDateKey(dateKey) {
      const [y, m, d] = dateKey.split('-').map(Number);
      return { y, m, d };
    }

    function formatDateLabel(dateKey) {
      const { y, m, d } = parseDateKey(dateKey);
      const day = new Date(Date.UTC(y, m - 1, d)).getUTCDay();
      return `${m}/${d}（${WEEKDAYS_JP[day]}）`;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch {
        return {};
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function ensureDayRecord(data, dateKey) {
      if (!data[dateKey]) {
        data[dateKey] = {
          preSleep: '',
          preWake: '',
          goGym: '',
          lieDown: '',
          sleep: '',
          secondSleep: '',
          poopStart: '',
          poopEnd: '',
          note: ''
        };
      }
      return data[dateKey];
    }

    function getRecentDateKeys(days) {
      const { dateKey } = getCurrentDateKeyAndTime();
      const { y, m, d } = parseDateKey(dateKey);
      const base = new Date(Date.UTC(y, m - 1, d));
      const keys = [];
      for (let i = 0; i < days; i++) {
        const dt = new Date(base);
        dt.setUTCDate(base.getUTCDate() - i);
        const yy = dt.getUTCFullYear();
        const mm = String(dt.getUTCMonth() + 1).padStart(2, '0');
        const dd = String(dt.getUTCDate()).padStart(2, '0');
        keys.push(`${yy}-${mm}-${dd}`);
      }
      return keys;
    }

    function pruneOldData(data) {
      const keep = new Set(getRecentDateKeys(DAYS_TO_SHOW + 12));
      for (const key of Object.keys(data)) {
        if (!keep.has(key)) delete data[key];
      }
    }

    function valueOrNone(v) {
      return v || '无数据';
    }

    function parseTimeToMinutes(text) {
      if (!text || !/^\d{2}:\d{2}$/.test(text)) return null;
      const [h, m] = text.split(':').map(Number);
      return h * 60 + m;
    }

    function formatDuration(start, end) {
      const s = parseTimeToMinutes(start);
      const e = parseTimeToMinutes(end);
      if (s == null || e == null) return '无数据';
      let diff = e - s;
      if (diff < 0) diff += 24 * 60;
      const h = Math.floor(diff / 60);
      const m = diff % 60;
      return `${h}小时${m}分`;
    }

    function setStatus(text, type = 'ok') {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = `status ${type === 'warn' ? 'warn-text' : 'ok'}`;
      clearTimeout(setStatus._timer);
      setStatus._timer = setTimeout(() => {
        el.textContent = '';
        el.className = 'status';
      }, 2200);
    }

    function refreshButtonState(button, timeText, disabled) {
      button.querySelector('.btn-time').textContent = timeText || '';
      button.disabled = disabled;
    }

    function renderButtons() {
      const { dateKey } = getCurrentDateKeyAndTime();
      const data = loadData();
      const day = ensureDayRecord(data, dateKey);
      for (const item of ALL_EVENTS) {
        const btn = document.getElementById(`btn-${item.key}`);
        const value = day[item.key] || '';
        refreshButtonState(btn, value, Boolean(value));
      }
    }

    function renderToday() {
      const { dateKey } = getCurrentDateKeyAndTime();
      const data = loadData();
      const day = ensureDayRecord(data, dateKey);
      document.getElementById('todayLabel').textContent = `今天：${formatDateLabel(dateKey)}`;
      document.getElementById('todaySummary').innerHTML = [
        `健身前睡了：<b>${valueOrNone(day.preSleep)}</b>`,
        `健身前醒了：<b>${valueOrNone(day.preWake)}</b>`,
        `健身前睡觉总时间：<b>${formatDuration(day.preSleep, day.preWake)}</b>`,
        `出门健身了：<b>${valueOrNone(day.goGym)}</b>`,
        `躺下了：<b>${valueOrNone(day.lieDown)}</b>`,
        `入睡：<b>${valueOrNone(day.sleep)}</b>`,
        `二次入睡：<b>${valueOrNone(day.secondSleep)}</b>`,
        `开始拉了：<b>${valueOrNone(day.poopStart)}</b>`,
        `拉了结束：<b>${valueOrNone(day.poopEnd)}</b>`,
        `拉了多久：<b>${formatDuration(day.poopStart, day.poopEnd)}</b>`
      ].join('　｜　');
      document.getElementById('todayNote').textContent = `今日备注：${day.note || '无数据'}`;
      renderButtons();
    }

    function renderHistory() {
      const body = document.getElementById('historyBody');
      const data = loadData();
      const keys = getRecentDateKeys(DAYS_TO_SHOW);
      body.innerHTML = keys.map(dateKey => {
        const day = data[dateKey] || {};
        return `
          <tr>
            <td>${formatDateLabel(dateKey)}</td>
            <td>${valueOrNone(day.preSleep)}</td>
            <td>${valueOrNone(day.preWake)}</td>
            <td>${formatDuration(day.preSleep, day.preWake)}</td>
            <td>${valueOrNone(day.goGym)}</td>
            <td>${valueOrNone(day.lieDown)}</td>
            <td>${valueOrNone(day.sleep)}</td>
            <td>${valueOrNone(day.secondSleep)}</td>
            <td>${valueOrNone(day.poopStart)}</td>
            <td>${valueOrNone(day.poopEnd)}</td>
            <td>${formatDuration(day.poopStart, day.poopEnd)}</td>
            <td>${valueOrNone(day.note)}</td>
          </tr>
        `;
      }).join('');
    }

    function recordEvent(eventKey) {
      const data = loadData();
      const { dateKey, timeText } = getCurrentDateKeyAndTime();
      const day = ensureDayRecord(data, dateKey);
      if (day[eventKey]) {
        setStatus(`${EVENT_LABELS[eventKey]} 今天已经记录过了`, 'warn');
        return;
      }
      day[eventKey] = timeText;
      pruneOldData(data);
      saveData(data);
      renderToday();
      renderHistory();
      setStatus(`已记录：${EVENT_LABELS[eventKey]} ${timeText}`);
    }

    function saveNote() {
      const input = document.getElementById('noteInput');
      const text = input.value.trim();
      if (!text) {
        setStatus('备注内容不能为空', 'warn');
        return;
      }
      const data = loadData();
      const { dateKey } = getCurrentDateKeyAndTime();
      const day = ensureDayRecord(data, dateKey);
      day.note = day.note ? `${day.note} / ${text}` : text;
      pruneOldData(data);
      saveData(data);
      input.value = '';
      renderToday();
      renderHistory();
      setStatus('备注已追加保存');
    }

    function toggleHistory() {
      const card = document.getElementById('historyCard');
      const btn = document.getElementById('toggleViewBtn');
      const show = card.classList.contains('hidden');
      card.classList.toggle('hidden', !show);
      btn.textContent = show ? '收起最近21天' : '显示最近21天';
      if (show) renderHistory();
    }

    function toggleMore() {
      const box = document.getElementById('extraButtons');
      const btn = document.getElementById('toggleMoreBtn');
      const show = box.classList.contains('hidden');
      box.classList.toggle('hidden', !show);
      btn.textContent = show ? '收起更多' : '更多';
    }

    function exportData() {
      const data = loadData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const { dateKey } = getCurrentDateKeyAndTime();
      a.href = url;
      a.download = `daily-tracker-backup-${dateKey}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setStatus('已导出备份');
    }

    function importDataFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!imported || typeof imported !== 'object' || Array.isArray(imported)) throw new Error();
          saveData(imported);
          renderToday();
          renderHistory();
          setStatus('已导入备份');
        } catch {
          setStatus('导入失败：文件格式不正确', 'warn');
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function clearAllData() {
      if (!confirm('确定要清空全部记录吗？这个操作不能撤销。')) return;
      localStorage.removeItem(STORAGE_KEY);
      renderToday();
      renderHistory();
      document.getElementById('noteInput').value = '';
      setStatus('已清空全部数据', 'warn');
    }

    document.querySelectorAll('button[data-event]').forEach(btn => {
      btn.addEventListener('click', () => recordEvent(btn.dataset.event));
    });

    document.getElementById('toggleViewBtn').addEventListener('click', toggleHistory);
    document.getElementById('toggleMoreBtn').addEventListener('click', toggleMore);
    document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
    document.getElementById('clearNoteInputBtn').addEventListener('click', () => {
      document.getElementById('noteInput').value = '';
    });
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', (e) => importDataFromFile(e.target.files[0]));
    document.getElementById('clearBtn').addEventListener('click', clearAllData);

    renderToday();
    renderHistory();
  </script>
</body>
</html>
